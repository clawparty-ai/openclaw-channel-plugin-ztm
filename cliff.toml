{% endif %}{% endfor %}{% endif %}{% endfor %}
{% for group, clist in commits | group_by(attribute="group") %}{% if group == "C Security" %}### 🔒 Security

{% for c in clist %}{% if not c.breaking %}{% set msg = c.message | split(pat="\n") | first | trim | upper_first %}- {{ msg }} ([{{ c.id | truncate(length=7, end="") }}]({{ c.id }})) - ({{ c.author.name }})
{% endif %}{% endfor %}{% endif %}{% endfor %}
{% for group, clist in commits | group_by(attribute="group") %}{% if group == "D Performance" %}### ⚡ Performance

{% for c in clist %}{% if not c.breaking %}{% set msg = c.message | split(pat="\n") | first | trim | upper_first %}- {{ msg }} ([{{ c.id | truncate(length=7, end="") }}]({{ c.id }})) - ({{ c.author.name }})
{% endif %}{% endfor %}{% endif %}{% endfor %}
