# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

"""
body = """{% if version %}## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}## Unreleased{% endif %}{% if previous %}{% if previous.commit_id and commit_id %}
[{{ previous.commit_id | truncate(length=7, end="") }}]({{ previous.commit_id }})...[{{ commit_id | truncate(length=7, end="") }}]({{ commit_id }}){% endif %}{% endif %}

### 🚨 BREAKING CHANGES

{% for c in commits %}{% if c.breaking %}{% set msg = c.message | split(pat="\n") | first | trim | upper_first %}- {{ msg }} ([{{ c.id | truncate(length=7, end="") }}]({{ c.id }})) - ({{ c.author.name }})
{% endif %}{% else %}- N/A{% endfor %}

{% for group, clist in commits | group_by(attribute="group") %}{% if group == "A Features" %}### 🚀 Features

{% for c in clist %}{% if not c.breaking %}{% set msg = c.message | split(pat="\n") | first | trim | upper_first %}- {{ msg }} ([{{ c.id | truncate(length=7, end="") }}]({{ c.id }})) - ({{ c.author.name }})
{% endif %}{% endfor %}{% endif %}{% endfor %}
{% for group, clist in commits | group_by(attribute="group") %}{% if group == "B Bug Fixes" %}### 🐛 Bug Fixes

