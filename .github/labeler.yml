# ============================================================================
# Multi-dimensional Labeling System for actions/labeler@v5
# Dimensions: kind (type), area (scope), size (files changed)
# ============================================================================

# ----------------------------------------------------------------------------
# Dimension 1: Kind (from conventional commit type)
# Uses 'match' to match PR title patterns
# ----------------------------------------------------------------------------

'kind/feature':
  - match: '^feat(\(.*\))?:'

'kind/bug':
  - match: '^fix(\(.*\))?:'

'kind/refactor':
  - match: '^refactor(\(.*\))?:'

'kind/docs':
  - match: '^docs(\(.*\))?:'

'kind/test':
  - match: '^test(\(.*\))?:'

'kind/chore':
  - match: '^chore(\(.*\))?:'

'kind/ci':
  - match: '^ci(\(.*\))?:'

'kind/perf':
  - match: '^perf(\(.*\))?:'

'kind/build':
  - match: '^build(\(.*\))?:'

'kind/release':
  - match: '^release:'

'kind/security':
  - match: '^security:'

'kind/breaking':
  - match: '.*!.*:'

# ----------------------------------------------------------------------------
# Dimension 2: Area (from commit scope OR changed files)
# Multiple conditions are OR'd: matches commit scope OR file path
# ----------------------------------------------------------------------------

# Messaging - message processing pipeline
'area/messaging':
  - match: '^(feat|fix|refactor|test|docs)\(messaging\):'
  - changed-files:
      - any: ['src/messaging/**', 'src/messaging/*.ts']

# API - ZTM Agent API clients
'area/api':
  - match: '^(feat|fix|refactor|test|docs)\(api\):'
  - changed-files:
      - any: ['src/api/**', 'src/api/*.ts']

# Runtime - runtime state & persistence
'area/runtime':
  - match: '^(feat|fix|refactor|test|docs)\(runtime\):'
  - changed-files:
      - any: ['src/runtime/**', 'src/runtime/*.ts']

# Core - business logic (DM/group policies)
'area/core':
  - match: '^(feat|fix|refactor|test|docs)\(core\):'
  - changed-files:
      - any: ['src/core/**', 'src/core/*.ts']

# Channel - OpenClaw plugin entry
'area/channel':
  - match: '^(feat|fix|refactor|test|docs)\(channel\):'
  - changed-files:
      - any: ['src/channel/**', 'src/channel/*.ts']

# DI - dependency injection
'area/di':
  - match: '^(feat|fix|refactor)\(di\):'
  - changed-files:
      - any: ['src/di/**', 'src/di/*.ts']

# Config - configuration schema & validation
'area/config':
  - match: '^(feat|fix)\(config\):'
  - changed-files:
      - any: ['src/config/**', 'src/config/*.ts']

# Onboarding - user onboarding & pairing
'area/onboarding':
  - match: '^(feat|fix)\(onboarding\):'
  - changed-files:
      - any: ['src/onboarding/**', 'src/onboarding/*.ts']

# Connectivity - connection management
'area/connectivity':
  - match: '^(feat|fix)\(connectivity\):'
  - changed-files:
      - any: ['src/connectivity/**', 'src/connectivity/*.ts']

# Security - security utilities
'area/security':
  - match: '^(feat|fix|security)\(security\):'
  - changed-files:
      - any: ['src/security/**', 'src/security/*.ts']

# Types - TypeScript type definitions
'area/types':
  - match: '^(feat|fix)\(types\):'
  - changed-files:
      - any: ['src/types/**', 'src/types/*.ts']

# Utils - utility functions
'area/utils':
  - match: '^(feat|fix)\(utils\):'
  - changed-files:
      - any: ['src/utils/**', 'src/utils/*.ts']

# Test utilities
'area/test-utils':
  - match: '^feat\(test-utils\):'
  - changed-files:
      - any: ['src/test-utils/**', 'src/test-utils/*.ts']

# Documentation
'area/documentation':
  - match: '^docs.*:'
  - changed-files:
      - any: ['**/*.md', 'docs/**', '.claude/**', '.github/**/*.md']

# CI/CD
'area/ci':
  - match: '^ci.*:'
  - changed-files:
      - any: ['.github/workflows/**', '.github/actions/**']

# Dependencies
'area/dependencies':
  - match: '.*dependencies.*|.*deps.*:'
  - changed-files:
      - any: ['package.json', 'package-lock.json']

# ----------------------------------------------------------------------------
# Dimension 3: Size (from files changed count)
# Uses file count thresholds to categorize PR size
# ----------------------------------------------------------------------------

'size/xs':
  - changed-files:
      - any: ['**/*.ts', '**/*.md', '**/*.json']
        max-count: 3

'size/s':
  - changed-files:
      - any: ['**/*.ts', '**/*.md', '**/*.json']
        max-count: 10

'size/m':
  - changed-files:
      - any: ['**/*.ts', '**/*.md', '**/*.json']
        count-threshold: 11
        max-count: 20

'size/l':
  - changed-files:
      - any: ['**/*.ts', '**/*.md', '**/*.json']
        count-threshold: 21
        max-count: 50

'size/xl':
  - changed-files:
      - any: ['**/*.ts', '**/*.md', '**/*.json']
        count-threshold: 51
