name: Publish to npm

on:
  push:
    tags:
      # Supports: v1.2.3, v1.2.3-alpha.1, v1.2.3-beta.1, v1.2.3-rc.1
      # Does NOT support: v1.2.3.1 (patch versions)
      - 'v[0-9]+.[0-9]+.[0-9]+(-alpha.[0-9]+|-beta.[0-9]+|-rc.[0-9]+)?$'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          # Determine the appropriate tag based on version type
          if [[ "${{ github.ref }}" =~ -alpha\.|-beta\.|-rc\. ]]; then
            # Pre-release versions publish to 'next' tag
            npm publish --tag next
          else
            # Stable versions publish to 'latest' tag
            npm publish --tag latest
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
