name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Generate release notes
        id: changelog
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          # Use the already-generated CHANGELOG.md from the repository
          # This was generated locally with `npm run changelog` before tagging
          if [ -f CHANGELOG.md ]; then
            # Extract content after "[unreleased]" section header
            # This gets all the changes for the current release
            awk '/^## \[unreleased\]/,0' CHANGELOG.md > RELEASE_NOTES.md
            # If awk produced empty file, use a fallback
            if [ ! -s RELEASE_NOTES.md ]; then
              echo "Release v${CURRENT_TAG}" > RELEASE_NOTES.md
            fi
          else
            echo "Release v${CURRENT_TAG}" > RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
