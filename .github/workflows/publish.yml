name: Publish to npm

on:
  push:
    tags:
      # Supports: v2026.2.18, v2026.2.18-rc.1, v2026.2.18-alpha.1, v2026.2.18-beta.1
      # Format: vYYYY.M.D with optional prerelease suffix
      - "v[0-9]{4}\\.[0-9]{1,2}\\.[0-9]{1,2}(-.*)?$"
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag or branch to publish (e.g., v2026.2.18-alpha.1)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          # Determine the ref to use (workflow_dispatch input or github.ref)
          REF="${{ github.event.inputs.ref || github.ref }}"
          # Extract tag name (remove 'refs/tags/' prefix if present)
          TAG_NAME="${REF#refs/tags/}"
          # Determine the appropriate tag based on version type
          if [[ "$TAG_NAME" =~ -alpha\.|-beta\.|-rc\. ]]; then
            # Pre-release versions publish to 'next' tag
            npm publish --tag next
          else
            # Stable versions publish to 'latest' tag
            npm publish --tag latest
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        run: |
          # Determine the ref to use (workflow_dispatch input or github.ref)
          REF="${{ github.event.inputs.ref || github.ref }}"
          # Extract tag name (remove 'refs/tags/' prefix if present)
          TAG_NAME="${REF#refs/tags/}"
          # Check if it's a prerelease version
          PRERELEASE=false
          if [[ "$TAG_NAME" =~ -alpha\.|-beta\.|-rc\. ]]; then
            PRERELEASE=true
          fi
          # Create release using GitHub CLI
          gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file RELEASE_NOTES.md --draft=false --prerelease=$PRERELEASE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
