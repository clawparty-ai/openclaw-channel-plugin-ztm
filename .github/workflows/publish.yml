name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Generate release notes
        id: changelog
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          # Get the previous tag for changelog generation
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            # Generate changelog from previous tag to current tag
            git-cliff --from "$PREV_TAG" --to HEAD > RELEASE_NOTES.md
          else
            # Fallback: generate full changelog
            git-cliff > RELEASE_NOTES.md
          fi
          # Use a fallback if changelog is empty
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release v${CURRENT_TAG}" > RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
