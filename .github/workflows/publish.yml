name: Publish to npm

on:
  push:
    tags:
      # Supports: v2026.2.18, v2026.2.18-rc.1, v2026.2.18-alpha.1, v2026.2.18-beta.1
      # Format: vYYYY.M.D with optional prerelease suffix
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*-alpha.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*-beta.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*-rc.[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          # Extract tag name from git ref
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # Determine the appropriate tag based on version type
          if [[ "$TAG_NAME" =~ -alpha\.|-beta\.|-rc\. ]]; then
            # Pre-release versions publish to 'next' tag
            npm publish --tag next
          else
            # Stable versions publish to 'latest' tag
            npm publish --tag latest
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Determine previous tag for changelog
        id: determine-tag
        run: |
          # Extract tag from git ref
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"

          # Check if current tag is a prerelease version (alpha, beta, rc)
          if [[ "$CURRENT_TAG" =~ -alpha\.|-beta\.|-rc\. ]]; then
            # For prerelease: find the previous tag (any type)
            PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
            echo "current_type=prerelease" >> $GITHUB_OUTPUT
          else
            # For stable: find the previous stable tag
            PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v "$CURRENT_TAG" | head -n 1 || echo "")
            echo "current_type=stable" >> $GITHUB_OUTPUT
          fi

          echo "previous_tag=${PREV_TAG}" >> $GITHUB_OUTPUT
          echo "Current tag: ${CURRENT_TAG}, Previous tag: ${PREV_TAG}"

      - name: Generate a changelog
        run: |
          # Download and install git-cliff binary
          GIT_CLIFF_VERSION=$(curl -s https://api.github.com/repos/orhun/git-cliff/releases/latest | grep -oP '"tag_name": "\K[^"]+')
          curl -sL "https://github.com/orhun/git-cliff/releases/download/${GIT_CLIFF_VERSION}/git-cliff-x86_64-unknown-linux-gnu.tar.gz" | tar -xz -C /usr/local/bin/ git-cliff

          # Generate changelog with the determined base tag
          git-cliff --config cliff.toml --verbose --base ${{ steps.determine-tag.outputs.previous_tag }} --strip header > RELEASE_NOTES.md

      - name: Create GitHub Release
        run: |
          # Extract tag name from git ref
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # Check if it's a prerelease version
          PRERELEASE=false
          if [[ "$TAG_NAME" =~ -alpha\.|-beta\.|-rc\. ]]; then
            PRERELEASE=true
          fi
          # Create release using GitHub CLI
          gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file RELEASE_NOTES.md --draft=false --prerelease=$PRERELEASE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
