name: Documentation

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'src/**/*.ts'
      - 'index.ts'
      - 'typedoc.json'
      - 'package.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.ts'
      - 'index.ts'
      - 'typedoc.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install TypeDoc
        run: npm install --save-dev typedoc

      - name: Generate documentation
        run: npx typedoc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/typedoc

  deploy:
    needs: docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
